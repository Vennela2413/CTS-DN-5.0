<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CSS Inclusion Methods</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Internal CSS -->
    <style>

        body{
            background-color:#f4f4f4;
        }

    </style>

</head>

<body>

    <!-- Header Section -->
    <header>

        <!-- Inline CSS -->
        <h1 style="color:red;">

            Local Community Event Portal

        </h1>

    </header>

    <!-- Main Content -->
    <main class="content">

        <h2>
            Welcome Residents
        </h2>

        <p>
            This portal helps residents register for events,
            access services, and explore community activities.
        </p>

        <button class="cta-button">
            Register Now
        </button>

    </main>

</body>

</html>
