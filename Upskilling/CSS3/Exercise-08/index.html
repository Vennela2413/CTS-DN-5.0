<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Box Model and Layout Control</title>

    <!-- External CSS -->
    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <!-- Main Container -->
    <div class="container">

        <h1>
            Community Event Portal
        </h1>

        <!-- Event Card -->
        <div class="eventCard">

            <h2>
                Music Festival
            </h2>

            <p>
                Join the annual music festival with
                live performances and entertainment.
            </p>

        </div>

        <!-- Event Card -->
        <div class="eventCard">

            <h2>
                Sports Meet
            </h2>

            <p>
                Participate in community sports
                competitions and activities.
            </p>

        </div>

        <!-- Form Section -->
        <form>

            <label>
                Full Name
            </label>

            <input type="text"
                   placeholder="Enter your name"
                   class="highlightField">

            <label>
                Email Address
            </label>

            <input type="email"
                   placeholder="Enter your email">

        </form>

        <!-- Visibility Example -->
        <div class="hiddenBox">

            visibility:hidden Example

        </div>

        <div class="noneBox">

            display:none Example

        </div>

    </div>

</body>

</html>
