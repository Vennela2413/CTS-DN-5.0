<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Color and Background Styling</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <!-- Header -->
    <header class="main-header">

        <h1>
            Local Community Event Portal
        </h1>

    </header>

    <!-- Main Content -->
    <main class="container">

        <!-- Event Section -->
        <section class="event-section">

            <h2>
                Upcoming Community Events
            </h2>

            <p>
                Explore city festivals, sports programs,
                workshops, and cultural celebrations happening
                this month.
            </p>

        </section>

        <!-- Information Section -->
        <section class="info-section">

            <h2>
                Community Services
            </h2>

            <p>
                Residents can access online registrations,
                emergency support information,
                and event schedules through the portal.
            </p>

        </section>

    </main>

</body>

</html>
