<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Typography and Fonts</title>

    <!-- Google Font -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
          rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <!-- Header -->
    <header class="main-header">

        <h1>
            Local Community Event Portal
        </h1>

    </header>

    <!-- Main Content -->
    <main class="container">

        <!-- Event Section -->
        <section class="event-section">

            <h2>
                Community Music Festival
            </h2>

            <p class="description">

                Experience live performances,
                cultural programs, and exciting
                entertainment activities with your
                family and friends.

            </p>

        </section>

        <!-- Workshop Section -->
        <section class="event-section">

            <h2>
                Art & Creativity Workshop
            </h2>

            <p class="description">

                Participate in creative workshops
                conducted by experienced artists
                and community volunteers.

            </p>

        </section>

    </main>

</body>

</html>
