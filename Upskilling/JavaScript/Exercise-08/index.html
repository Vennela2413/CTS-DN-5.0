<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Event Handling</title>

    <!-- External CSS -->
    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <!-- Main Container -->
    <div class="container">

        <h1>
            Community Events
        </h1>

        <!-- Search Box -->
        <input type="text"
               id="searchInput"
               placeholder="Search Event">

        <!-- Category Filter -->
        <select id="categoryFilter">

            <option value="All">

                All Categories

            </option>

            <option value="Music">

                Music

            </option>

            <option value="Food">

                Food

            </option>

            <option value="Workshop">

                Workshop

            </option>

        </select>

        <!-- Event Container -->
        <div id="eventContainer">

        </div>

    </div>

    <!-- External JavaScript -->
    <script src="main.js"></script>

</body>

</html>
