<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Modern JavaScript Features</title>

    <!-- External CSS -->
    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <!-- Main Container -->
    <div class="container">

        <h1>
            Modern JavaScript Event Portal
        </h1>

        <!-- Buttons -->

            <button onclick="showEvents()">

                Show Events

            </button>

            <button onclick="showClonedEvents()">

                Clone Events

            </button>

        </div>

        <!-- Event Container -->
        <div id="eventContainer">

        </div>

    </div>

    <!-- External JavaScript -->
    <script src="main.js"></script>

</body>

</html>
