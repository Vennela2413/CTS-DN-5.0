<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AJAX and Fetch API</title>

    <!-- External CSS -->
    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <!-- Main Container -->
    <div class="container">

        <h1>
            Community Event Registration
        </h1>

        <!-- Registration Form -->
        <form id="registrationForm">

            <label>
                Full Name
            </label>

            <input type="text"
                   id="username"
                   placeholder="Enter your name">

            <label>
                Email Address
            </label>

            <input type="email"
                   id="email"
                   placeholder="Enter your email">

            <button type="submit">

                Submit Registration

            </button>

        </form>

        <!-- Loading Message -->
        <div id="loading">

            Sending Registration...

        </div>

        <!-- Response Message -->
        <div id="responseMessage">

        </div>

    </div>

    <!-- External JavaScript -->
    <script src="main.js"></script>

</body>

</html>
