<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>jQuery and JS Frameworks</title>

    <!-- External CSS -->
    <link rel="stylesheet"
          href="styles.css">

    <!-- jQuery CDN -->
    <script
        src="https://code.jquery.com/jquery-3.7.1.min.js">
    </script>

</head>

<body>

    <!-- Main Container -->
    <div class="container">

        <h1>
            Community Event Portal
        </h1>

        <!-- Event Card -->
        <div id="eventCard">

            <h2>
                Music Festival
            </h2>

            <p>
                Join the annual community music festival
                with live performances and activities.
            </p>

        </div>

        <!-- Buttons -->
        <div class="button-group">

            <button id="registerBtn">

                Register

            </button>

            <button id="hideBtn">

                Fade Out

            </button>

            <button id="showBtn">

                Fade In

            </button>

        </div>

        <!-- Framework Benefit -->
        <div class="framework-info">

            <h3>
                Benefit of React or Vue
            </h3>

            <p>
                Frameworks like React and Vue help
                developers build reusable UI components
                and create faster dynamic applications.
            </p>

        </div>

    </div>

    <!-- External JavaScript -->
    <script src="main.js"></script>

</body>

</html>
