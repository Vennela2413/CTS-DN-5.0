<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debugging with Chrome DevTools</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background-color:#f4f4f4;
            padding:40px;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0px 0px 12px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#1e3a8a;
            margin-bottom:20px;
        }

        p{
            line-height:1.7;
            color:#444;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:14px;
            background-color:#2563eb;
            color:white;
            border:none;
            border-radius:6px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background-color:#1d4ed8;
        }

        #output{
            margin-top:20px;
            padding:15px;
            background-color:#eef2ff;
            border-radius:8px;
            font-weight:bold;
            color:#111827;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Chrome DevTools Debugging</h1>

        <p>
            This page demonstrates debugging techniques using
            Chrome DevTools and JavaScript console logs.
        </p>

        <button onclick="calculateTotal()">
            Calculate Total
        </button>

        <div id="output">
            Output will appear here.
        </div>

    </div>

    <script>

        function calculateTotal(){

            // Variables
            let ticketPrice = 150;

            let numberOfTickets = 3;

            let totalAmount =
                ticketPrice * numberOfTickets;

            // Console Log
            console.log("Ticket Price:", ticketPrice);

            console.log("Number of Tickets:",
                numberOfTickets);

            console.log("Total Amount:",
                totalAmount);

            // Output Display
            document.getElementById("output").innerHTML =

                "Total Event Cost: ₹" + totalAmount;

            // Breakpoint Area
            debugger;
        }

    </script>

</body>

</html>
