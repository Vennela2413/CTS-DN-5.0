<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Icons</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- Bootstrap Icons CDN -->

    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- External CSS -->

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container">

            <!-- Logo -->

            <a class="navbar-brand fw-bold"
               href="#">

                <i class="bi bi-calendar-event me-2">

                </i>

                Community Portal

            </a>

            <!-- Navigation Links -->

            <div class="navbar-nav ms-auto">

                <a class="nav-link active"
                   href="#">

                    <i class="bi bi-house-door-fill me-1">

                    </i>

                    Home

                </a>

                <a class="nav-link"
                   href="#">

                    <i class="bi bi-people-fill me-1">

                    </i>

                    Events

                </a>

                <a class="nav-link"
                   href="#">

                    <i class="bi bi-envelope-fill me-1">

                    </i>

                    Contact

                </a>

            </div>

        </div>

    </nav>

    <!-- Main Container -->

    <div class="container py-5">

        <!-- Heading -->

        <div class="text-center mb-5">

            <h1 class="text-primary fw-bold">

                Bootstrap Icons Demo

            </h1>

            <p class="lead text-muted">

                Modern webpage using Bootstrap Icons.

            </p>

        </div>

        <!-- Cards Section -->

        <div class="row g-4">

            <!-- Card 1 -->

            <div class="col-md-4">

                <div class="icon-card">

                    <i class="bi bi-music-note-beamed
                              icon-large
                              text-primary">

                    </i>

                    <h3 class="mt-4 text-primary">

                        Music Festival

                    </h3>

                    <p>

                        Enjoy live music events
                        and entertainment programs.

                    </p>

                    <button class="btn btn-primary">

                        <i class="bi bi-ticket-fill me-2">

                        </i>

                        Book Now

                    </button>

                </div>

            </div>

            <!-- Card 2 -->

            <div class="col-md-4">

                <div class="icon-card">

                    <i class="bi bi-cup-hot-fill
                              icon-large
                              text-success">

                    </i>

                    <h3 class="mt-4 text-success">

                        Food Carnival

                    </h3>

                    <p>

                        Explore delicious cuisines
                        and cultural activities.

                    </p>

                    <button class="btn btn-success">

                        <i class="bi bi-cart-fill me-2">

                        </i>

                        Explore Food

                    </button>

                </div>

            </div>

            <!-- Card 3 -->

            <div class="col-md-4">

                <div class="icon-card">

                    <i class="bi bi-palette-fill
                              icon-large
                              text-danger">

                    </i>

                    <h3 class="mt-4 text-danger">

                        Art Workshop

                    </h3>

                    <p>

                        Participate in creative
                        learning workshops.

                    </p>

                    <button class="btn btn-danger">

                        <i class="bi bi-brush-fill me-2">

                        </i>

                        Join Workshop

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
