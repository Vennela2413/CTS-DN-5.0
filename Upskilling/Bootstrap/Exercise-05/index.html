<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Alignment and Reordering</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- External CSS -->

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <!-- Main Container -->

    <div class="container py-5">

        <!-- Heading -->

        <div class="text-center mb-5">

            <h1 class="text-primary">

                Alignment and Reordering

            </h1>

            <p class="lead text-muted">

                Bootstrap alignment and column ordering utilities.

            </p>

        </div>

        <!-- Alignment Section -->

        <div class="row
                    justify-content-center
                    align-items-center
                    text-center
                    mb-5
                    custom-row">

            <!-- Box 1 -->

            <div class="col-md-3">

                <div class="box bg-primary">

                    Music Event

                </div>

            </div>

            <!-- Box 2 -->

            <div class="col-md-3">

                <div class="box bg-success">

                    Food Carnival

                </div>

            </div>

            <!-- Box 3 -->

            <div class="col-md-3">

                <div class="box bg-danger">

                    Art Workshop

                </div>

            </div>

        </div>

        <!-- Reordering Section -->

        <div class="row g-4">

            <!-- First Column -->

            <div class="col-md-6 order-md-2">

                <div class="content-card">

                    <h2 class="text-primary">

                        Main Content

                    </h2>

                    <p>

                        This column appears second
                        on medium and larger devices
                        using
                        <strong>order-md-2</strong>.

                    </p>

                </div>

            </div>

            <!-- Second Column -->

            <div class="col-md-6 order-md-1">

                <div class="content-card">

                    <h2 class="text-success">

                        Sidebar Content

                    </h2>

                    <p>

                        This column appears first
                        on medium and larger devices
                        using
                        <strong>order-md-1</strong>.

                    </p>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
