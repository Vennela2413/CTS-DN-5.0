<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sizing and Spacing Utilities</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- External CSS -->

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <!-- Main Container -->

    <div class="container py-5">

        <!-- Heading -->

        <div class="text-center mb-5">

            <h1 class="text-primary fw-bold">

                Sizing and Spacing Utilities

            </h1>

            <p class="lead text-muted">

                Bootstrap width, height,
                margin, and padding utilities.

            </p>

        </div>

        <!-- Width Utilities -->

        <div class="utility-section
                    p-5
                    m-4">

            <h2 class="mb-4 text-primary">

                Width Utilities

            </h2>

            <!-- w-25 -->

            <div class="utility-box
                        bg-primary
                        text-white
                        w-25
                        mb-3">

                Width 25%

            </div>

            <!-- w-50 -->

            <div class="utility-box
                        bg-success
                        text-white
                        w-50
                        mb-3">

                Width 50%

            </div>

            <!-- w-75 -->

            <div class="utility-box
                        bg-warning
                        text-dark
                        w-75
                        mb-3">

                Width 75%

            </div>

            <!-- w-100 -->

            <div class="utility-box
                        bg-danger
                        text-white
                        w-100">

                Width 100%

            </div>

        </div>

        <!-- Height Utilities -->

        <div class="utility-section
                    p-5
                    m-4">

            <h2 class="mb-4 text-success">

                Height Utilities

            </h2>

            <div class="height-container">

                <!-- h-25 -->

                <div class="height-box
                            bg-primary
                            text-white
                            h-25">

                    Height 25%

                </div>

                <!-- h-50 -->

                <div class="height-box
                            bg-success
                            text-white
                            h-50">

                    Height 50%

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
