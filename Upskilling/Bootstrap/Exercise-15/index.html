<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Borders Shadows Rounded Corners</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- External CSS -->

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <!-- Main Container -->

    <div class="container py-5">

        <!-- Heading -->

        <div class="text-center mb-5">

            <h1 class="text-primary fw-bold">

                Borders, Shadows & Rounded Corners

            </h1>

            <p class="lead text-muted">

                Bootstrap utility classes for styling components.

            </p>

        </div>

        <!-- Cards Section -->

        <div class="row g-4">

            <!-- Card 1 -->

            <div class="col-md-4">

                <div class="card
                            border
                            border-primary
                            shadow
                            rounded
                            h-100">

                    <div class="card-body text-center">

                        <img
                        src="https://picsum.photos/120"

                        class="rounded-circle mb-4"

                        alt="Music Event">

                        <h3 class="text-primary">

                            Music Festival

                        </h3>

                        <p>

                            Community music event
                            with modern Bootstrap styling.

                        </p>

                    </div>

                </div>

            </div>

            <!-- Card 2 -->

            <div class="col-md-4">

                <div class="card
                            border
                            border-success
                            shadow-lg
                            rounded
                            h-100">

                    <div class="card-body text-center">

                        <img
                        src="https://picsum.photos/121"

                        class="rounded-circle mb-4"

                        alt="Food Carnival">

                        <h3 class="text-success">

                            Food Carnival

                        </h3>

                        <p>

                            Explore cuisines and
                            cultural activities.

                        </p>

                    </div>

                </div>

            </div>

            <!-- Card 3 -->

            <div class="col-md-4">

                <div class="card
                            border
                            border-danger
                            shadow-lg
                            rounded
                            h-100">

                    <div class="card-body text-center">

                        <img
                        src="https://picsum.photos/122"

                        class="rounded-circle mb-4"

                        alt="Workshop">

                        <h3 class="text-danger">

                            Art Workshop

                        </h3>

                        <p>

                            Creative learning sessions
                            and interactive workshops.

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
