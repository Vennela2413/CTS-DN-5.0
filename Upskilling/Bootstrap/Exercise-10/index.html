<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Navbars and Navigation</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- External CSS -->

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <!-- Responsive Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container">

            <!-- Logo -->

            <a class="navbar-brand fw-bold"
               href="#">

                Community Portal

            </a>

            <!-- Toggle Button -->

            <button class="navbar-toggler"

                    type="button"

                    data-bs-toggle="collapse"

                    data-bs-target="#navbarContent">

                <span class="navbar-toggler-icon">

                </span>

            </button>

            <!-- Navbar Content -->

            <div class="collapse navbar-collapse"
                 id="navbarContent">

                <!-- Navigation Links -->

                <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                    <li class="nav-item">

                        <a class="nav-link active"
                           href="#">

                            Home

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link"
                           href="#">

                            Events

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link"
                           href="#">

                            Services

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link"
                           href="#">

                            Contact

                        </a>

                    </li>

                </ul>

                <!-- Search Form -->

                <form class="d-flex">

                    <input class="form-control me-2"

                           type="search"

                           placeholder="Search">

                    <button class="btn btn-light"
                            type="submit">

                        Search

                    </button>

                </form>

            </div>

        </div>

    </nav>

    <!-- Main Container -->

    <div class="container py-5">

        <!-- Heading -->

        <div class="text-center mb-5">

            <h1 class="text-primary">

                Navigation Components

            </h1>

            <p class="lead text-muted">

                Bootstrap nav, nav-tabs,
                and nav-pills examples.

            </p>

        </div>

        <!-- Nav Tabs -->

        <div class="navigation-card mb-5">

            <h3 class="mb-4">

                Nav Tabs

            </h3>

            <ul class="nav nav-tabs">

                <li class="nav-item">

                    <a class="nav-link active"
                       href="#">

                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#">

                        Events

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#">

                        Gallery

                    </a>

                </li>

            </ul>

        </div>

        <!-- Nav Pills -->

        <div class="navigation-card">

            <h3 class="mb-4">

                Nav Pills

            </h3>

            <ul class="nav nav-pills">

                <li class="nav-item">

                    <a class="nav-link active"
                       href="#">

                        Music

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#">

                        Food

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#">

                        Workshops

                    </a>

                </li>

            </ul>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
