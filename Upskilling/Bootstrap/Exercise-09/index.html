<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Buttons</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- External CSS -->

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <!-- Main Container -->

    <div class="container py-5">

        <!-- Heading -->

        <div class="text-center mb-5">

            <h1 class="text-primary">

                Bootstrap Buttons

            </h1>

            <p class="lead text-muted">

                Different Bootstrap button styles,
                groups, and toggle buttons.

            </p>

        </div>

        <!-- Contextual Buttons -->

        <div class="button-section mb-5">

            <h3 class="mb-4">

                Contextual Buttons

            </h3>

            <button class="btn btn-primary m-2">

                Primary

            </button>

            <button class="btn btn-secondary m-2">

                Secondary

            </button>

            <button class="btn btn-success m-2">

                Success

            </button>

            <button class="btn btn-danger m-2">

                Danger

            </button>

            <button class="btn btn-warning m-2">

                Warning

            </button>

            <button class="btn btn-info m-2">

                Info

            </button>

        </div>

        <!-- Outline Buttons -->

        <div class="button-section mb-5">

            <h3 class="mb-4">

                Outline Buttons

            </h3>

            <button class="btn btn-outline-primary m-2">

                Outline Primary

            </button>

            <button class="btn btn-outline-success m-2">

                Outline Success

            </button>

            <button class="btn btn-outline-danger m-2">

                Outline Danger

            </button>

        </div>

        <!-- Button Group -->

        <div class="button-section mb-5">

            <h3 class="mb-4">

                Button Group

            </h3>

            <div class="btn-group">

                <button class="btn btn-primary">

                    Home

                </button>

                <button class="btn btn-success">

                    Events

                </button>

                <button class="btn btn-danger">

                    Contact

                </button>

            </div>

        </div>

        <!-- Toggle Buttons -->

        <div class="button-section">

            <h3 class="mb-4">

                Toggle Buttons

            </h3>

            <div class="btn-group"
                 role="group">

                <input type="checkbox"

                       class="btn-check"

                       id="music">

                <label class="btn btn-outline-primary"
                       for="music">

                    Music

                </label>

                <input type="checkbox"

                       class="btn-check"

                       id="food">

                <label class="btn btn-outline-success"
                       for="food">

                    Food

                </label>

                <input type="checkbox"

                       class="btn-check"

                       id="sports">

                <label class="btn btn-outline-danger"
                       for="sports">

                    Sports

                </label>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
