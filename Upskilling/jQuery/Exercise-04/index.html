<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DOM Manipulation</title>

    <script
    src="https://code.jquery.com/jquery-3.7.1.min.js">
    </script>

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <div class="container">

        <h1>

            Event Registration List

        </h1>

        <input type="text"
               id="eventInput"
               placeholder="Enter Event Name">

        <button id="addBtn">

            Add Event

        </button>

        <button id="removeBtn">

            Remove All

        </button>

        <ul id="eventList">

        </ul>

    </div>

    <script src="main.js"></script>

</body>

</html>
