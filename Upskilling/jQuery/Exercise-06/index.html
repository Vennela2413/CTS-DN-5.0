<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Event Helpers</title>

    <script
    src="https://code.jquery.com/jquery-3.7.1.min.js">
    </script>

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <div class="container">

        <h1>

            jQuery Event Helpers

        </h1>

        <div id="eventBox">

            Perform Events Here

        <input type="text"

        <!-- Output -->

        <p id="output">

            Typed Text Will Appear Here

        </p>

    </div>

    <script src="main.js"></script>

</body>

</html>
