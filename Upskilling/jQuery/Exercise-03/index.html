<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>jQuery Methods</title>

    <script
    src="https://code.jquery.com/jquery-3.7.1.min.js">
    </script>

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <div class="container">

        <h1>

            jQuery Methods Demo

        </h1>

        <div class="buttons">

            <button id="hideBtn">

                Hide

            </button>

            <button id="showBtn">

                Show

            </button>

            <button id="fadeOutBtn">

                Fade Out

            </button>

            <button id="fadeInBtn">

                Fade In

            </button>

            <button id="toggleBtn">

                Toggle

            </button>

            <button id="bonusBtn">

                Bonus Effect

            </button>

        </div>

        <div class="box-container">

            <div class="box">

                Box 1

            </div>

            <div class="box">

                Box 2

            </div>

            <div class="box">

                Box 3

            </div>

        </div>

    </div>

    <script src="main.js"></script>

</body>

</html>
